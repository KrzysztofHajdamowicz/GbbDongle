name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  pages: write
  id-token: write        # Sigstore signing for attestations + Pages deploy
  attestations: write    # Upload attestations to GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # `config` doubles as the artifact basename; the gbbdongle.* names
        # are kept for the Waveshare board so update manifests already in
        # the field keep resolving.
        config: [gbbdongle, gbbdongle-tcan485, gbbdongle-kamami]
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Cache PlatformIO and ESPHome build
        uses: actions/cache@v6
        with:
          path: |
            ~/.cache/esphome
            firmware/.esphome
          key: pio-${{ runner.os }}-${{ matrix.config }}-${{ hashFiles('uv.lock', 'firmware/**/*.yaml') }}
          restore-keys: |
            pio-${{ runner.os }}-${{ matrix.config }}-

      - name: Compile firmware
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          uv run esphome -s version "$VERSION" compile "firmware/${{ matrix.config }}.yaml"

      - name: Collect binaries
        run: |
          BUILD_DIR="firmware/.esphome/build/${{ matrix.config }}/build"
          mkdir -p dist
          cp "$BUILD_DIR/firmware.factory.bin" "dist/${{ matrix.config }}.factory.bin"
          cp "$BUILD_DIR/firmware.ota.bin" "dist/${{ matrix.config }}.ota.bin"

      - uses: actions/upload-artifact@v7
        with:
          name: firmware-${{ matrix.config }}
          path: dist/
          if-no-files-found: error

  assemble:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/download-artifact@v8
        with:
          pattern: firmware-*
          merge-multiple: true
          path: site/firmware

      - name: Assemble site and manifests
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          RELEASE_URL="https://github.com/${GITHUB_REPOSITORY}/releases/tag/${GITHUB_REF_NAME}"
          cp -R static/. site/

          # Board table: <config basename> <chipFamily> <manifest suffix> <display name...>
          # Per-board manifests are required because chipFamily alone cannot
          # distinguish the two plain-ESP32 boards (T-CAN485 and Kamami):
          # each install button and each device's update entity points at its
          # own manifest instead.
          BOARDS='
          gbbdongle          ESP32-S3 gbbdongle Waveshare ESP32-S3-RS485-CAN
          gbbdongle-tcan485  ESP32    tcan485   LilyGo T-CAN485
          gbbdongle-kamami   ESP32    kamami    Kamami KAmod ESP32 ETH+PoE
          '

          while read -r config chip suffix name; do
            [ -z "$config" ] && continue
            md5=$(md5sum "site/firmware/${config}.ota.bin" | cut -d' ' -f1)

            # Per-board ESP Web Tools manifest (browser flashing over USB).
            cat > "site/firmware/manifest-${suffix}.json" <<EOF
          {
            "name": "GbbDongle (${name})",
            "version": "$VERSION",
            "new_install_prompt_erase": true,
            "builds": [
              {
                "chipFamily": "${chip}",
                "parts": [{ "path": "${config}.factory.bin", "offset": 0 }]
              }
            ]
          }
          EOF

            # Per-board manifest for the esphome http_request update entity
            # (OTA); each device yaml points update_manifest_url at its own.
            cat > "site/firmware/update-manifest-${suffix}.json" <<EOF
          {
            "name": "GbbDongle (${name})",
            "version": "$VERSION",
            "builds": [
              {
                "chipFamily": "${chip}",
                "ota": {
                  "path": "${config}.ota.bin",
                  "md5": "${md5}",
                  "summary": "GbbDongle $VERSION",
                  "release_url": "${RELEASE_URL}"
                }
              }
            ]
          }
          EOF
          done <<< "$BOARDS"

          # ── Legacy shared manifests ──
          # Kept for devices already in the field (they poll this URL and
          # migrate to their per-board manifest with their next OTA) and for
          # old bookmarks. Deliberately NOT extended with the Kamami board:
          # its chipFamily (ESP32) would collide with the T-CAN485 entry.
          MD5_S3=$(md5sum site/firmware/gbbdongle.ota.bin | cut -d' ' -f1)
          MD5_TCAN485=$(md5sum site/firmware/gbbdongle-tcan485.ota.bin | cut -d' ' -f1)
          cat > site/firmware/manifest.json <<EOF
          {
            "name": "GbbDongle",
            "version": "$VERSION",
            "new_install_prompt_erase": true,
            "builds": [
              {
                "chipFamily": "ESP32-S3",
                "parts": [{ "path": "gbbdongle.factory.bin", "offset": 0 }]
              },
              {
                "chipFamily": "ESP32",
                "parts": [{ "path": "gbbdongle-tcan485.factory.bin", "offset": 0 }]
              }
            ]
          }
          EOF

          cat > site/firmware/update-manifest.json <<EOF
          {
            "name": "GbbDongle",
            "version": "$VERSION",
            "builds": [
              {
                "chipFamily": "ESP32-S3",
                "ota": {
                  "path": "gbbdongle.ota.bin",
                  "md5": "$MD5_S3",
                  "summary": "GbbDongle $VERSION",
                  "release_url": "${RELEASE_URL}"
                }
              },
              {
                "chipFamily": "ESP32",
                "ota": {
                  "path": "gbbdongle-tcan485.ota.bin",
                  "md5": "$MD5_TCAN485",
                  "summary": "GbbDongle $VERSION",
                  "release_url": "${RELEASE_URL}"
                }
              }
            ]
          }
          EOF

          jq . site/firmware/manifest*.json site/firmware/update-manifest*.json > /dev/null

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

      # ── SBOM: build toolchain ──
      # Scans pyproject.toml / uv.lock (esphome + the whole Python toolchain
      # the firmware is built with). The C components baked into the binary
      # (ESP-IDF, ArduinoJson) are pinned by the esphome version listed here.
      - name: Generate toolchain SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom-toolchain.cyclonedx.json

      - name: Rename SBOM for release
        run: cp sbom-toolchain.cyclonedx.json "SBOM-Toolchain-${GITHUB_REF_NAME#v}.cyclonedx.json"

      # ── Attestations ──
      # Sigstore-signed provenance: proves the firmware binaries were built by
      # THIS workflow in THIS repo. Verify with:
      #   gh attestation verify gbbdongle.factory.bin --owner KrzysztofHajdamowicz
      - name: Attest firmware build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: site/firmware/*.bin

      - name: Attest firmware SBOM
        uses: actions/attest@v4
        with:
          subject-path: site/firmware/*.bin
          predicate-type: https://cyclonedx.org/bom
          predicate-path: sbom-toolchain.cyclonedx.json

      - name: Attach binaries and SBOM to release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            site/firmware/*.bin
            SBOM-Toolchain-*.cyclonedx.json

  deploy-pages:
    needs: assemble
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
