name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  pages: write
  id-token: write        # Sigstore signing for attestations + Pages deploy
  attestations: write    # Upload attestations to GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Cache PlatformIO and ESPHome build
        uses: actions/cache@v6
        with:
          path: |
            ~/.cache/esphome
            firmware/.esphome
          key: pio-${{ runner.os }}-${{ hashFiles('uv.lock', 'firmware/**/*.yaml') }}
          restore-keys: |
            pio-${{ runner.os }}-

      - name: Compile firmware
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          uv run esphome -s version "$VERSION" compile firmware/gbbdongle.yaml

      - name: Assemble site and manifests
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BUILD_DIR=firmware/.esphome/build/gbbdongle/build
          mkdir -p site/firmware
          cp static/index.html site/
          cp "$BUILD_DIR/firmware.factory.bin" site/firmware/gbbdongle.factory.bin
          cp "$BUILD_DIR/firmware.ota.bin" site/firmware/gbbdongle.ota.bin
          MD5=$(md5sum site/firmware/gbbdongle.ota.bin | cut -d' ' -f1)

          # ESP Web Tools manifest (browser flashing over USB)
          cat > site/firmware/manifest.json <<EOF
          {
            "name": "GbbDongle",
            "version": "$VERSION",
            "new_install_prompt_erase": true,
            "builds": [
              {
                "chipFamily": "ESP32-S3",
                "parts": [{ "path": "gbbdongle.factory.bin", "offset": 0 }]
              }
            ]
          }
          EOF

          # Manifest for the esphome http_request update entity (OTA)
          cat > site/firmware/update-manifest.json <<EOF
          {
            "name": "GbbDongle",
            "version": "$VERSION",
            "builds": [
              {
                "chipFamily": "ESP32-S3",
                "ota": {
                  "path": "gbbdongle.ota.bin",
                  "md5": "$MD5",
                  "summary": "GbbDongle $VERSION",
                  "release_url": "https://github.com/${GITHUB_REPOSITORY}/releases/tag/${GITHUB_REF_NAME}"
                }
              }
            ]
          }
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

      # ── SBOM: build toolchain ──
      # Scans pyproject.toml / uv.lock (esphome + the whole Python toolchain
      # the firmware is built with). The C components baked into the binary
      # (ESP-IDF, ArduinoJson) are pinned by the esphome version listed here.
      - name: Generate toolchain SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom-toolchain.cyclonedx.json

      - name: Rename SBOM for release
        run: cp sbom-toolchain.cyclonedx.json "SBOM-Toolchain-${GITHUB_REF_NAME#v}.cyclonedx.json"

      # ── Attestations ──
      # Sigstore-signed provenance: proves the firmware binaries were built by
      # THIS workflow in THIS repo. Verify with:
      #   gh attestation verify gbbdongle.factory.bin --owner KrzysztofHajdamowicz
      - name: Attest firmware build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            site/firmware/gbbdongle.factory.bin
            site/firmware/gbbdongle.ota.bin

      - name: Attest firmware SBOM
        uses: actions/attest@v4
        with:
          subject-path: |
            site/firmware/gbbdongle.factory.bin
            site/firmware/gbbdongle.ota.bin
          predicate-type: https://cyclonedx.org/bom
          predicate-path: sbom-toolchain.cyclonedx.json

      - name: Attach binaries and SBOM to release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            site/firmware/gbbdongle.factory.bin
            site/firmware/gbbdongle.ota.bin
            SBOM-Toolchain-*.cyclonedx.json

  deploy-pages:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
