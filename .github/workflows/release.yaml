name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  pages: write
  id-token: write        # Sigstore signing for attestations + Pages deploy
  attestations: write    # Upload attestations to GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # `config` doubles as the artifact basename; the gbbdongle.* names
          # are kept for the Waveshare board so update manifests already in
          # the field keep resolving.
          - config: gbbdongle
            chip_family: ESP32-S3
          - config: gbbdongle-tcan485
            chip_family: ESP32
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Cache PlatformIO and ESPHome build
        uses: actions/cache@v6
        with:
          path: |
            ~/.cache/esphome
            firmware/.esphome
          key: pio-${{ runner.os }}-${{ matrix.config }}-${{ hashFiles('uv.lock', 'firmware/**/*.yaml') }}
          restore-keys: |
            pio-${{ runner.os }}-${{ matrix.config }}-

      - name: Compile firmware
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          uv run esphome -s version "$VERSION" compile "firmware/${{ matrix.config }}.yaml"

      - name: Collect binaries
        run: |
          BUILD_DIR="firmware/.esphome/build/${{ matrix.config }}/build"
          mkdir -p dist
          cp "$BUILD_DIR/firmware.factory.bin" "dist/${{ matrix.config }}.factory.bin"
          cp "$BUILD_DIR/firmware.ota.bin" "dist/${{ matrix.config }}.ota.bin"

      - uses: actions/upload-artifact@v7
        with:
          name: firmware-${{ matrix.config }}
          path: dist/
          if-no-files-found: error

  assemble:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/download-artifact@v8
        with:
          pattern: firmware-*
          merge-multiple: true
          path: site/firmware

      - name: Assemble site and manifests
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cp static/index.html site/
          MD5_S3=$(md5sum site/firmware/gbbdongle.ota.bin | cut -d' ' -f1)
          MD5_TCAN485=$(md5sum site/firmware/gbbdongle-tcan485.ota.bin | cut -d' ' -f1)

          # ESP Web Tools manifest (browser flashing over USB); the flasher
          # picks the build matching the detected chip family.
          cat > site/firmware/manifest.json <<EOF
          {
            "name": "GbbDongle",
            "version": "$VERSION",
            "new_install_prompt_erase": true,
            "builds": [
              {
                "chipFamily": "ESP32-S3",
                "parts": [{ "path": "gbbdongle.factory.bin", "offset": 0 }]
              },
              {
                "chipFamily": "ESP32",
                "parts": [{ "path": "gbbdongle-tcan485.factory.bin", "offset": 0 }]
              }
            ]
          }
          EOF

          # Manifest for the esphome http_request update entity (OTA); the
          # update component picks the build whose chipFamily matches.
          cat > site/firmware/update-manifest.json <<EOF
          {
            "name": "GbbDongle",
            "version": "$VERSION",
            "builds": [
              {
                "chipFamily": "ESP32-S3",
                "ota": {
                  "path": "gbbdongle.ota.bin",
                  "md5": "$MD5_S3",
                  "summary": "GbbDongle $VERSION",
                  "release_url": "https://github.com/${GITHUB_REPOSITORY}/releases/tag/${GITHUB_REF_NAME}"
                }
              },
              {
                "chipFamily": "ESP32",
                "ota": {
                  "path": "gbbdongle-tcan485.ota.bin",
                  "md5": "$MD5_TCAN485",
                  "summary": "GbbDongle $VERSION",
                  "release_url": "https://github.com/${GITHUB_REPOSITORY}/releases/tag/${GITHUB_REF_NAME}"
                }
              }
            ]
          }
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

      # ── SBOM: build toolchain ──
      # Scans pyproject.toml / uv.lock (esphome + the whole Python toolchain
      # the firmware is built with). The C components baked into the binary
      # (ESP-IDF, ArduinoJson) are pinned by the esphome version listed here.
      - name: Generate toolchain SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom-toolchain.cyclonedx.json

      - name: Rename SBOM for release
        run: cp sbom-toolchain.cyclonedx.json "SBOM-Toolchain-${GITHUB_REF_NAME#v}.cyclonedx.json"

      # ── Attestations ──
      # Sigstore-signed provenance: proves the firmware binaries were built by
      # THIS workflow in THIS repo. Verify with:
      #   gh attestation verify gbbdongle.factory.bin --owner KrzysztofHajdamowicz
      - name: Attest firmware build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            site/firmware/gbbdongle.factory.bin
            site/firmware/gbbdongle.ota.bin
            site/firmware/gbbdongle-tcan485.factory.bin
            site/firmware/gbbdongle-tcan485.ota.bin

      - name: Attest firmware SBOM
        uses: actions/attest@v4
        with:
          subject-path: |
            site/firmware/gbbdongle.factory.bin
            site/firmware/gbbdongle.ota.bin
            site/firmware/gbbdongle-tcan485.factory.bin
            site/firmware/gbbdongle-tcan485.ota.bin
          predicate-type: https://cyclonedx.org/bom
          predicate-path: sbom-toolchain.cyclonedx.json

      - name: Attach binaries and SBOM to release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            site/firmware/gbbdongle.factory.bin
            site/firmware/gbbdongle.ota.bin
            site/firmware/gbbdongle-tcan485.factory.bin
            site/firmware/gbbdongle-tcan485.ota.bin
            SBOM-Toolchain-*.cyclonedx.json

  deploy-pages:
    needs: assemble
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
