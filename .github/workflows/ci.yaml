name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        config: [gbbdongle, gbbdongle-tcan485, gbbdongle-kamami]
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Cache PlatformIO and ESPHome build
        uses: actions/cache@v6
        with:
          path: |
            ~/.cache/esphome
            firmware/.esphome
          key: pio-${{ runner.os }}-${{ matrix.config }}-${{ hashFiles('uv.lock', 'firmware/**/*.yaml') }}
          restore-keys: |
            pio-${{ runner.os }}-${{ matrix.config }}-

      - name: Validate configuration
        run: uv run esphome config firmware/${{ matrix.config }}.yaml

      - name: Compile firmware
        run: uv run esphome compile firmware/${{ matrix.config }}.yaml
