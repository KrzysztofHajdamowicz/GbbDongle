version: 2
updates:
  - package-ecosystem: uv
    directory: /
    schedule:
      interval: weekly
      day: monday
    assignees:
      - KrzysztofHajdamowicz
    labels:
      - dependencies
    # Give freshly published releases a week to prove themselves before
    # Dependabot proposes them, so we never chase a brand-new package.
    cooldown:
      default-days: 7
    # One PR per week for all minor/patch bumps (esphome + its pinned
    # toolchain move together); majors come as their own PRs for manual review.
    groups:
      python-toolchain:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    assignees:
      - KrzysztofHajdamowicz
    labels:
      - dependencies
    cooldown:
      default-days: 7
    groups:
      github-actions:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
