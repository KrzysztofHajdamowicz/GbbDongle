# Development variant for the Waveshare ESP32-S3-RS485-CAN: verbose logging,
# joins your WiFi from secrets.yaml (see common/dev.yaml).
# Build & flash: uv run esphome run firmware/gbbdongle-dev.yaml

substitutions:
  device_name: gbbdongle-dev
  friendly_name: GbbDongle Dev

packages:
  base: !include common/base.yaml
  board: !include boards/waveshare-esp32-s3-rs485-can.yaml
  dev: !include common/dev.yaml
