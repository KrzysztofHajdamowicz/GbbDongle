text:
  - platform: template
    id: cfg_mqtt_host
    name: MQTT Server
    icon: mdi:server-network
    entity_category: config
    mode: text
    optimistic: true
    restore_value: true
    initial_value: ""
    min_length: 0
    max_length: 128
  - platform: template
    id: cfg_plant_id
    name: Plant Id
    icon: mdi:solar-power
    entity_category: config
    mode: text
    optimistic: true
    restore_value: true
    initial_value: ""
    min_length: 0
    max_length: 64
  - platform: template
    id: cfg_plant_token
    name: Plant Token
    icon: mdi:key
    entity_category: config
    mode: password
    optimistic: true
    restore_value: true
    initial_value: ""
    min_length: 0
    max_length: 64

number:
  - platform: template
    id: cfg_mqtt_port
    name: MQTT Port
    icon: mdi:numeric
    entity_category: config
    optimistic: true
    restore_value: true
    initial_value: 8883
    min_value: 1
    max_value: 65535
    step: 1
    mode: box

select:
  - platform: template
    id: cfg_baud_rate
    name: RS485 Baud Rate
    icon: mdi:swap-horizontal
    entity_category: config
    optimistic: true
    restore_value: true
    options:
      - "2400"
      - "4800"
      - "9600"
      - "19200"
      - "38400"
      - "57600"
      - "115200"
    initial_option: "9600"
  - platform: template
    id: cfg_parity
    name: RS485 Parity
    icon: mdi:swap-horizontal
    entity_category: config
    optimistic: true
    restore_value: true
    options:
      - "None"
      - "Even"
      - "Odd"
    initial_option: "None"

switch:
  - platform: template
    id: cfg_cloud_enabled
    name: Cloud Connection
    icon: mdi:cloud-upload
    entity_category: config
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
  - platform: template
    id: cfg_tls_enabled
    name: TLS
    icon: mdi:lock
    entity_category: config
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
  - platform: template
    id: cfg_tls_skip_cn_check
    name: TLS Skip CN Check
    icon: mdi:lock-alert
    entity_category: config
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF

button:
  - platform: restart
    name: Apply Settings (Restart)
    icon: mdi:restart

binary_sensor:
  - platform: template
    name: Cloud Connected
    device_class: connectivity
    lambda: return id(gbb_mqtt).is_connected();
  - platform: template
    name: Restart Required
    icon: mdi:restart-alert
    entity_category: diagnostic
    lambda: return id(gbb).is_settings_dirty();

sensor:
  - platform: template
    name: Requests Handled
    icon: mdi:counter
    entity_category: diagnostic
    state_class: total_increasing
    accuracy_decimals: 0
    update_interval: 60s
    lambda: return id(gbb).get_requests_handled();
  - platform: template
    name: Modbus Errors
    icon: mdi:alert-circle
    entity_category: diagnostic
    state_class: total_increasing
    accuracy_decimals: 0
    update_interval: 60s
    lambda: return id(gbb).get_modbus_errors();
  - platform: wifi_signal
    name: WiFi Signal
    entity_category: diagnostic
    update_interval: 60s

text_sensor:
  - platform: template
    name: Firmware Version
    entity_category: diagnostic
    update_interval: never
    lambda: return {"${version}"};
  - platform: wifi_info
    ip_address:
      name: IP Address
      entity_category: diagnostic
