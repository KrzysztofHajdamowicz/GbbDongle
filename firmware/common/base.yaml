# Shared configuration for all GbbDongle firmware variants.
# Target hardware: Waveshare ESP32-S3-RS485-CAN
#   RS485: TX=GPIO17, RX=GPIO18, direction control=GPIO21
#   16 MB flash, 8 MB Octal PSRAM

substitutions:
  device_name: gbbdongle
  friendly_name: GbbDongle
  version: 0.0.0-dev
  log_level: DEBUG
  update_manifest_url: https://krzysztofhajdamowicz.github.io/GbbDongle/firmware/update-manifest.json

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  min_version: 2026.7.0
  project:
    name: krzysztofhajdamowicz.gbbdongle
    version: ${version}

esp32:
  board: esp32-s3-devkitc-1
  flash_size: 16MB
  framework:
    type: esp-idf

psram:
  mode: octal
  speed: 80MHz

external_components:
  - source:
      type: local
      path: ../components

logger:
  level: ${log_level}
  hardware_uart: USB_SERIAL_JTAG

api:
  reboot_timeout: 0s

web_server:
  version: 3

wifi:
  reboot_timeout: 0s
  ap:
    ssid: GbbDongle Setup

captive_portal:

improv_serial:

esp32_improv:
  authorizer: none

safe_mode:

ota:
  - platform: esphome
  - platform: web_server
  - platform: http_request

http_request:

update:
  - platform: http_request
    id: firmware_update
    name: Firmware
    source: ${update_manifest_url}
    update_interval: 6h

uart:
  id: rs485_uart
  tx_pin: GPIO17
  rx_pin: GPIO18
  baud_rate: 9600
  data_bits: 8
  parity: NONE
  stop_bits: 1
  rx_buffer_size: 512

# The broker/credentials below are placeholders: GbbDongle applies the
# runtime-configured values (entities below, persisted in NVS) before calling
# enable(). enable_on_boot must stay false.
mqtt:
  id: gbb_mqtt
  broker: 127.0.0.1
  port: 8883
  enable_on_boot: false
  discovery: false
  reboot_timeout: 0s
  birth_message:
  will_message:
  shutdown_message:
  log_topic:

gbb_dongle:
  id: gbb
  uart_id: rs485_uart
  mqtt_id: gbb_mqtt
  flow_control_pin: GPIO21
  version: ${version}
  environment: GbbDongle
  mqtt_host_id: cfg_mqtt_host
  mqtt_port_id: cfg_mqtt_port
  plant_id_id: cfg_plant_id
  plant_token_id: cfg_plant_token
  cloud_enabled_id: cfg_cloud_enabled
  tls_enabled_id: cfg_tls_enabled
  tls_skip_cn_check_id: cfg_tls_skip_cn_check
  baud_rate_id: cfg_baud_rate
  parity_id: cfg_parity
