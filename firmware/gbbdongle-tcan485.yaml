# Release firmware for GbbDongle (LilyGo T-CAN485).
# Build: uv run esphome compile firmware/gbbdongle-tcan485.yaml
# CI overrides the version: uv run esphome -s version 1.2.3 compile ...

substitutions:
  device_name: gbbdongle-tcan485

packages:
  base: !include common/base.yaml
  board: !include boards/lilygo-t-can485.yaml
